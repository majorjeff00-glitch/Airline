version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airline_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/airline_booking?schema=public"
      NEXTAUTH_SECRET: "super-secret-key-change-in-production-abc123"
      NEXTAUTH_URL: "http://localhost:3000"
      JWT_SECRET: "jwt-secret-key-change-in-production-xyz789"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npx tsx prisma/seed.ts && npm start"

volumes:
  pgdata:
